<svg viewBox="0 0 900 56" xmlns="http://www.w3.org/2000/svg" width="900" height="56">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#3DDC84"/>
      <stop offset="70%"  stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="56" fill="url(#fbg)"/>

  <!-- Top line (matches banner bottom line colour) -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#fline)" filter="url(#fg)"/>

  <!-- Footer text — centred -->
  <text x="450" y="33" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#8B949E" letter-spacing="2.5"
        >KATHMANDU, NEPAL · OPEN TO INTERNSHIPS · BUILDING IN PUBLIC</text>

  <!-- Cursor — placed after the text.
       Text ~60 chars × ~9px = 540px wide, half=270, right edge ≈ 720, cursor at 727 -->
  <rect x="727" y="20" width="7" height="15" rx="1" fill="#3DDC84" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom line -->
  <rect x="0" y="54" width="900" height="2" fill="#3DDC84" opacity="0.35" filter="url(#fg)"/>
</svg>