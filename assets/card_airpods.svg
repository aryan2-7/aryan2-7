<svg viewBox="0 0 860 150" xmlns="http://www.w3.org/2000/svg" width="860" height="150">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E6934A" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#E6934A"/>
      <stop offset="65%"  stop-color="#E6934A"/>
      <stop offset="100%" stop-color="#E6934A" stop-opacity="0"/>
    </linearGradient>
    <filter id="ig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="150" rx="8" fill="url(#cbg)"/>
  <rect width="860" height="150" rx="8" fill="none" stroke="#E6934A" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="0" y="0" width="860" height="3" rx="1.5" fill="url(#topline)"/>

  <!-- Icon -->
  <text x="32" y="52" font-family="'JetBrains Mono','Fira Code',monospace" font-size="24"
        fill="#E6934A" filter="url(#ig)">◉</text>

  <!-- Title -->
  <text x="64" y="46" font-family="'JetBrains Mono','Fira Code',monospace" font-size="16" font-weight="700"
        fill="#E6EDF3" letter-spacing="0.5">airpods-cli</text>

  <!-- Subtitle — capped width so it never overflows -->
  <text x="64" y="66" font-family="'JetBrains Mono','Fira Code',monospace" font-size="10.5" fill="#8B949E"
        textLength="750" lengthAdjust="spacing">macOS ANC / Transparency mode switcher from the terminal · full PyPI release</text>

  <!-- Divider -->
  <rect x="24" y="90" width="812" height="1" fill="#E6934A" opacity="0.12"/>

  <!-- Pills -->
  
  <rect x="50" y="112" width="62" height="22" rx="11"
        fill="#E6934A" fill-opacity="0.10" stroke="#E6934A" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="81" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="9.5" fill="#E6934A" letter-spacing="0.3">Python</text>
  <rect x="122" y="112" width="55" height="22" rx="11"
        fill="#E6934A" fill-opacity="0.10" stroke="#E6934A" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="149" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="9.5" fill="#E6934A" letter-spacing="0.3">Click</text>
  <rect x="187" y="112" width="83" height="22" rx="11"
        fill="#E6934A" fill-opacity="0.10" stroke="#E6934A" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="228" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="9.5" fill="#E6934A" letter-spacing="0.3">hatchling</text>
  <rect x="280" y="112" width="118" height="22" rx="11"
        fill="#E6934A" fill-opacity="0.10" stroke="#E6934A" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="339" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="9.5" fill="#E6934A" letter-spacing="0.3">GitHub Actions</text>
  <rect x="408" y="112" width="48" height="22" rx="11"
