<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" width="900" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow1" cx="28%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#3DDC84" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#3DDC84" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>
    <clipPath id="clip"><rect width="900" height="260"/></clipPath>
    <filter id="textglow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineglow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DDC84" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58A6FF"/>
      <stop offset="70%" stop-color="#3DDC84"/>
      <stop offset="100%" stop-color="#3DDC84" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="260" fill="url(#bg)"/>
  <rect width="900" height="260" fill="url(#grid)"/>
  <rect width="900" height="260" fill="url(#glow1)"/>
  <rect width="900" height="260" fill="url(#glow2)"/>

  <!-- Shimmer sweep -->
  <rect clip-path="url(#clip)" x="-900" y="0" width="900" height="260"
        fill="url(#shimmer)" opacity="0.035">
    <animate attributeName="x" from="-900" to="900" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="#58A6FF" opacity="0.55" filter="url(#lineglow)"/>

  <!-- Floating code — left cluster, kept x < 160 so never overlaps centre -->
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#58A6FF" opacity="0.18" x="22" y="36">#include</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#3DDC84"  opacity="0.15" x="12" y="56">import click</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" fill="#E6934A"  opacity="0.13" x="32" y="74">cv2.imread()</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" fill="#58A6FF" opacity="0.10" x="8"  y="92">std::vector</text>

  <!-- Floating code — right cluster, kept x < 860 and text short enough to fit -->
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#3DDC84"  opacity="0.18" x="738" y="200">def main():</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" fill="#58A6FF" opacity="0.15" x="780" y="220">git push</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" fill="#E6934A"  opacity="0.13" x="748" y="240">rasterio</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" fill="#3DDC84"  opacity="0.10" x="760" y="182">→ shipped</text>

  <!-- Corner bracket decorations — well inside viewbox -->
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="55" fill="#58A6FF" opacity="0.05" x="840" y="254">}</text>
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="55" fill="#3DDC84"  opacity="0.04" x="10"  y="254">{</text>

  <!-- Main name -->
  <text x="450" y="110" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="50" font-weight="700" letter-spacing="2"
        fill="#E6EDF3" filter="url(#textglow)">Aryan Khatri</text>

  <!-- Underline -->
  <rect x="315" y="120" width="270" height="2.5" rx="1.5" fill="url(#linegrad)"/>

  <!-- Subtitle -->
  <text x="450" y="156" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" font-weight="400" letter-spacing="4"
        fill="#8B949E">COMPUTER ENGINEERING · KATHMANDU UNIVERSITY</text>

  <!-- Tagline — centred, cursor placed AFTER it -->
  <!-- Text: "C++ & Python · Computer Vision · Open to Internships"
       ~52 chars × 7.6px/char at font-size 13 ≈ 395px wide → half = 197px
       Right edge of text ≈ 450 + 197 = 647 → cursor at x=654 -->
  <text x="450" y="196" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="13" fill="#58A6FF" opacity="0.85"
        >C++ &amp; Python · Computer Vision · Building in Public</text>
  <rect x="656" y="182" width="8" height="16" rx="1" fill="#3DDC84">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent line -->
  <rect x="0" y="258" width="900" height="2" fill="#3DDC84" opacity="0.4" filter="url(#lineglow)"/>
</svg>